# Nginx server configuration for local reverse proxy

# Requires the following map in the main nginx.conf inside the http {} block
# (e.g. /opt/homebrew/etc/nginx/nginx.conf on macOS Homebrew)
# Map upgrade header for WebSocket/SSE support
#map $http_upgrade $connection_upgrade {
#  default upgrade;
#  '' '';
#}

server {
  listen 3201 ssl;
  http2 on;
  server_name localhost;

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied expired no-cache no-store private auth;
  gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml application/json;
  gzip_disable "MSIE [1-6]\.";

  ssl_certificate /opt/homebrew/etc/nginx/certs/my_ssl_cert.crt;
  ssl_certificate_key /opt/homebrew/etc/nginx/certs/my_ssl_cert.key;
  ssl_protocols TLSv1.2 TLSv1.3;

  # Client cert verification
  ssl_client_certificate /opt/homebrew/etc/nginx/certs/client_ca.crt; # intermediate CA that signs individual client certs
  ssl_verify_client on;
  ssl_verify_depth 2;

  location / {
    proxy_pass http://localhost:3101;

    proxy_set_header X-Client-DN $ssl_client_s_dn;
    proxy_set_header X-Client-Verify $ssl_client_verify;

    # WebSocket support
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # Standard proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Don't time out long-lived WS connections
    proxy_read_timeout  86400s;
    proxy_send_timeout  86400s;
  }
}
