changelog:
  categories:
    - title: Breaking Changes 🛠
      labels:
        - breaking change
    - title: Exciting New Features 🎉
      labels:
        - enhancement
    - title: Bug Fixes 🐛
      labels:
        - bug
    - title: Other Changes
      labels:
        - "*"
      exclude:
        labels:
          - dependencies
          - bug
    - title: Dependencies
      labels:
        - dependencies
